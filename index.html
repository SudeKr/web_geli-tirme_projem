<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVault v3 - Software Engineering Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-300 font-sans selection:bg-indigo-500 pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- COMPONENTS (Parçalara Bölme
        const Header = ({ name }) => (
            <header className="flex justify-between items-end mb-12 border-b border-slate-800 pb-8 mt-12 px-4">
                <div>
                    <h1 className="text-5xl font-black text-white tracking-tighter italic">CINE<span className="text-indigo-500">VAULT</span></h1>
                </div>
                <div className="text-right border-l-2 border-indigo-500 pl-4">
                    <p className="text-[10px] font-bold text-slate-500 uppercase">Developer</p>
                    <p className="text-sm font-black text-white tracking-wide">{name}</p>
                </div>
            </header>
        );

const MovieCard = ({ movie, onToggle, onRemove }) => (
    <div className="group glass rounded-3xl p-6 flex justify-between items-center transition-all duration-300 hover:border-indigo-500/30 hover:shadow-2xl hover:shadow-indigo-500/10">
        <div className="flex items-center gap-6">
            
            <div className="w-16 h-20 bg-slate-800/80 rounded-xl flex flex-col items-center justify-center border border-slate-700 shadow-inner group-hover:border-indigo-500/50 transition-all">
                <span className="text-2xl">🎬</span>
                <span className="text-[8px] font-black text-slate-500 mt-1 uppercase tracking-tighter">NO POSTER</span>
            </div>

            <div>
                <h3 className={`text-xl font-bold tracking-tight ${movie.watched ? 'text-slate-600 line-through' : 'text-white'}`}>
                    {movie.name}
                </h3>
                <div className="flex items-center gap-3 mt-2">
                    <span className="text-[10px] font-black text-indigo-400 px-2 py-0.5 bg-indigo-500/10 rounded-md">⭐ IMDB {movie.rate}</span>
                    <span className="text-[10px] font-bold text-slate-500 uppercase">{movie.genre || 'DRAMA'}</span>
                </div>
            </div>
        </div>
        
        <div className="flex items-center gap-2">
            <button 
                onClick={() => onToggle(movie.id)} 
                className={`px-4 py-2 rounded-xl font-black text-[10px] transition-all tracking-widest ${movie.watched ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/20' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}
            >
                {movie.watched ? "İZLENDİ" : "İZLE"}
            </button>
            <button 
                onClick={() => onRemove(movie.id)} 
                className="opacity-0 group-hover:opacity-100 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white px-4 py-2 rounded-xl font-black text-[10px] transition-all tracking-widest ml-2"
            >
                SİL
            </button>
        </div>
    </div>
);
        // --- MAIN APP ---
        function App() {
            const [movies, setMovies] = useState([]);
            const [input, setInput] = useState("");
            const developerName = "SUDE KARA"; 

            // 1. UZAK API VE LOCALSTORAGE AKIŞI
            useEffect(() => {
                const saved = localStorage.getItem("se_cine_v3");
                if (saved) {
                    setMovies(JSON.parse(saved));
                } else {
                    setMovies([
                        { id: 1, name: "INCEPTION", watched: true, rate: "8.8", genre: "SCI-FI" },
                        { id: 2, name: "THE MATRIX", watched: false, rate: "8.7", genre: "ACTION" },
                        { id: 3, name: "INTERSTELLAR", watched: false, rate: "8.7", genre: "ADVENTURE" },
                        { id: 4, name: "OPPENHEIMER", watched: false, rate: "8.4", genre: "BIOGRAPHY" }
                    ]);
                }
            }, []);

            // Hafızayı (LocalStorage) güncel tutma
            useEffect(() => {
                localStorage.setItem("se_cine_v3", JSON.stringify(movies));
            }, [movies]);

            // 2. EKLEME (Create)
            const add = () => {
                if (!input.trim()) return;
                const genres = ["SCI-FI", "DRAMA", "ACTION", "ADVENTURE"];
                const newMovie = { 
                    id: Date.now(), 
                    name: input.toUpperCase(), 
                    watched: false, 
                    rate: (Math.random() * 2 + 7).toFixed(1),
                    genre: genres[Math.floor(Math.random() * genres.length)] 
                };
                setMovies([newMovie, ...movies]);
                setInput("");
            };

            // 3. GÜNCELLEME (Update)
            const toggle = (id) => setMovies(movies.map(m => m.id === id ? {...m, watched: !m.watched} : m));

            // 4. SİLME (Delete)
            const remove = (id) => setMovies(movies.filter(m => m.id !== id));

            return (
                <div className="max-w-4xl mx-auto px-6">
                    
                    <Header name={developerName} />

                    {/* Arama / Ekleme Formu */}
                    <div className="glass rounded-[2rem] p-4 flex gap-4 mb-16 shadow-2xl shadow-slate-950/20">
                        <input 
                            className="bg-transparent flex-1 p-4 pl-6 outline-none text-white text-lg font-medium placeholder:text-slate-600"
                            placeholder="Yeni bir film adı yazın ve arşive ekleyin..."
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                        />
                        <button 
                            onClick={add} 
                            className="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-2xl font-black shadow-lg shadow-indigo-500/20 active:scale-95 transition-all tracking-widest uppercase text-xs"
                        >
                            ARŞİVLE
                        </button>
                    </div>

                    {/* Film Kartları Grid Yapısı (Listeleme, Güncelleme, Silme) */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {movies.map(movie => (
                            <MovieCard 
                                key={movie.id} 
                                movie={movie} 
                                onToggle={toggle} 
                                onRemove={remove} 
                            />
                        ))}
                    </div>

                    {/* Veri Yoksa Gösterilecek Mesaj */}
                    {movies.length === 0 && (
                        <div className="text-center py-20 border-2 border-dashed border-slate-800 rounded-3xl mt-12 glass">
                            <p className="text-slate-600 font-bold uppercase tracking-widest text-xs">Arşiv şu an boş...</p>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
